spring.application.name=Finsight-backend

# Database Configuration
#spring.datasource.url=jdbc:postgresql://localhost:5432/finsight
#spring.datasource.username=postgres
#spring.datasource.password=project
#spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:finsight}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Logging Configuration ───────────────────────────────────
# Keep security debug on for development, but set to info for production
logging.level.org.springframework.security=info
logging.level.simply.Finsight_backend=debug

# ─── Swagger / OpenAPI Configuration ─────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ─── Connection Pool (HikariCP — Spring Boot default) ─────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Prevents lazy loading issues and unnecessary DB connections
spring.jpa.open-in-view=false